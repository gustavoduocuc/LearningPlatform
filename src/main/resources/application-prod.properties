# Oracle Database Configuration (Production)
# Connection parameters are loaded from environment variables

spring.datasource.url=${ORACLE_DB_URL}
spring.datasource.driverClassName=oracle.jdbc.OracleDriver
spring.datasource.username=${ORACLE_DB_USERNAME}
spring.datasource.password=${ORACLE_DB_PASSWORD}

# JPA Configuration for Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Disable H2 Console in production
spring.h2.console.enabled=false

# Disable data initialization in production
app.data.initializer.enabled=false

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
